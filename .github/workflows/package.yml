name: Package Extension

on:
  push:
    branches:
      - master
      - fix/release-workflow
    paths:
      - '**.js'
      - '**.css'
      - '**.json'
      - 'icons/**'
      - 'vendor/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=$(jq -r .version manifest.json)" >> $GITHUB_OUTPUT

      - name: Create ZIP package
        run: |
          zip -r mermaid-atlassian-extension.zip . \
            -x "*.git*" \
            -x ".github*" \
            -x "README.md" \
            -x ".gitignore" \
            -x "reverse-engineering*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-atlassian-extension
          path: mermaid-atlassian-extension.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/fix/release-workflow')
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-test
          name: Release v${{ steps.get_version.outputs.VERSION }} (Test)
          files: mermaid-atlassian-extension.zip
          generate_release_notes: true
          prerelease: true
